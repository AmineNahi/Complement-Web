<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#534AB7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MonPWA" />

    <title>Mon Projet PWA</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <!-- Zone d'en-tête principale -->
    <header role="banner">
      <nav id="main-nav" role="navigation" aria-label="Menu principal">
        <!-- Généré dynamiquement par NavigationView.init() -->
      </nav>
    </header>

    <!-- Zone de contenu principal -->
    <main
      id="app-content"
      role="main"
      aria-live="polite"
      aria-atomic="true"
    >
      <!-- Pages chargées dynamiquement -->
    </main>

    <script type="module" src="js/main.js"></script>

    <div id="stats-container"></div>
    <div id="alert-container" aria-live="polite"></div>

    <div class="tabs">
      <div
        class="tab-registers"
        role="tablist"
        aria-label="Sections du tableau de bord"
      >
      </div>

      <div class="tab-bodies">

        <!-- Onglet 2 : historique -->
        <div
          id="panel-history"
          role="tabpanel"
          aria-labelledby="tab-history"
          hidden
        >
          <div class="graph-container">
            <h2>Historique des dernières 24h</h2>
            <canvas id="historique-graph"></canvas>
          </div>
        </div>
      </div>
    </div>

    <template id="capteur-template">
      <link rel="stylesheet" href="./css/styleAcceuil.css" />
      <div
        class="capteur-box"
        role="region"
        aria-label="Capteur de température"
      >
        <div class="nom">
          <slot name="nom">Capteur Inconnu</slot>
        </div>
        <div class="valeur">
          <slot name="valeur">0</slot> °C
        </div>
      </div>
    </template>

    <script>
      customElements.define(
        "capteur-thermique",
        class extends HTMLElement {
          constructor() {
            super();
            const template = document.getElementById("capteur-template").content;
            this.attachShadow({ mode: "open" }).appendChild(
              template.cloneNode(true)
            );
          }
        }
      );
    </script>

    <script src="./js/models/AlertModel.js"></script>
    <script src="./js/views/AlerteView.js"></script>
    <script src="./js/views/Onglet.js"></script>
    <script src="./js/controllers/AlerteController.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/views/HistoriqueView.js"></script>

  </body>
</html>
