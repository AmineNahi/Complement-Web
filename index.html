<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#534AB7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MonPWA" />

    <title>HOT HOT HOT</title>
    <link rel="stylesheet" href="./css/styleAcceuil.css">
    <link rel="stylesheet" href="./css/documentation.css">
    <!-- <link rel="stylesheet" href="/css/styles.css" /> -->
  </head>

  <body>
    <!-- Zone d'en-tête principale -->
    <header role="banner">
      <nav id="main-nav" role="navigation" aria-label="Menu principal">
        <!-- Généré dynamiquement par NavigationView.init() -->
      </nav>
    </header>

    <!-- Zone de contenu principal -->
    <main
      id="app-content"
      role="main"
      aria-live="polite"
      aria-atomic="true"
    >
      <!-- Pages chargées dynamiquement -->
    </main>

    <script type="module" src="js/main.js"></script>

    <script src="./js/models/AlertModel.js"></script>
    <script src="./js/models/CapteurModel.js"></script>
    <script src="./js/views/AlerteView.js"></script>
    <script src="./js/controllers/AlerteController.js"></script>
    <script src="./js/controllers/CapteurController.js"></script>
    <script src="./js/data/Data.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/views/GraphView.js"></script>

    <script>
        window.addEventListener('load', () => {
            try {
                const historique = new GraphView();
            } catch (error) {
                console.error("Problème avec le graphique :", error);
            }

            try {
                const appAlertes = new AlertController(new AlertModel(), new AlertView());
            } catch (error) {
                console.warn("Info: Le MVC n'est pas encore actif ou les fichiers sont manquants, mais l'interface continue de fonctionner.");
            }
            try {
                const appCapteurs = new CapteurController(null, null); 
            } catch (error) {
                console.error("Problème lors de l'initialisation des capteurs :", error);
            }
        });
    </script>

  </body>
</html>
