<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HOT HOT HOT</title>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/styleAcceuil.css">
  </head>
  <body>
    <nav class="menu" role="navigation" aria-label="Menu principal">
      <ul>
        <li><a href="index.html" aria-current="page">Accueil</a></li>
        <li><a href="documentation.html">Documentation</a></li>
        <li><a href="">Information du compte</a></li>
        <li><a href="">Déconnexion</a></li>
      </ul>
    </nav>

    <main>
        <h1>Tableau de bord domotique</h1>

        <div class="actions-container">
            <button id="btn-notifications" aria-label="Activer les notifications push">Activer les notifications</button>
            <button class="add-button" id="btn-install" aria-label="Installer l'application sur l'appareil">Installer l'application</button>
        </div>

        <div id="stats-container" role="region" aria-label="Synthèse journalière des températures"></div>
        <div id="alert-container" aria-live="polite" aria-label="Zone d'alertes"></div>

        <div class="capteurs-container" role="region" aria-label="Capteurs de température">
            <capteur-thermique id="capteur-int" nom="Intérieur"></capteur-thermique>
            <capteur-thermique id="capteur-ext" nom="Extérieur"></capteur-thermique>
        </div>

        <div class="graph-container" role="region" aria-label="Historique des températures sur 24 heures">
            <h2>Historique des dernières 24h</h2>
            <canvas id="historique-graph" role="img" aria-label="Graphique des températures intérieure et extérieure sur 24h"></canvas>
        </div>
    </main>

    <!-- Web Component -->
    <script>
        customElements.define('capteur-thermique',
            class extends HTMLElement {
                constructor() {
                    super();
                    const shadow = this.attachShadow({ mode: 'open' });
                    shadow.innerHTML = `
                        <link rel="stylesheet" href="./css/styleAcceuil.css">
                        <div class="capteur-box" role="region">
                            <div class="nom"></div>
                            <div class="valeur" aria-live="polite" aria-atomic="true">
                                <span class="val">--</span> °C
                            </div>
                        </div>`;
                    shadow.querySelector('.nom').textContent = this.getAttribute('nom') || '';
                    shadow.querySelector('.capteur-box').setAttribute('aria-label', `Capteur ${this.getAttribute('nom') || ''}`);
                }
                setValeur(v) { this.shadowRoot.querySelector('.val').textContent = v; }
                setNom(n)    { this.shadowRoot.querySelector('.nom').textContent = n; }
            }
        );
    </script>

    <!-- Modèles -->
    <script src="./js/Model/AlertModel.js"></script>

    <!-- Vues -->
    <script src="./js/View/AlerteView.js"></script>
    <script src="./js/View/CapteurView.js"></script>

    <!-- Contrôleur -->
    <script src="./js/Controllers/AlerteController.js"></script>

    <!-- MVC initialisé ICI, de manière synchrone, avant Chart.js et WebSocket -->
    <script>
        window.appAlertes = new AlertController(
            new AlertModel(),
            new AlertView(),
            new CapteurView()
        );
    </script>

    <!-- Chart.js puis HistoriqueView -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/View/HistoriqueView.js"></script>

    <!-- Graphique initialisé après Chart.js -->
    <script>
        window.historiqueView = new HistoriqueView();
    </script>

    <!-- WebSocket : window.appAlertes EST DÉJÀ PRÊT quand ce script s'exécute -->
    <script src="./js/data/webSocket.js"></script>

    <!-- Bouton installation PWA uniquement -->
    <script>
        window.addEventListener('load', () => {
            let deferredPrompt = null;
            const btnInstall = document.getElementById('btn-install');
            btnInstall.style.display = 'none';
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                btnInstall.style.display = 'inline-block';
            });
            btnInstall.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                btnInstall.style.display = 'none';
            });
        });
    </script>
  </body>
</html>
